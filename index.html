<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Clone</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="top-nav">
    <nav class="top-links">
      <a href="#">About</a>
      <a href="#">Store</a>
    </nav>
    <nav class="top-icons">
      <a href="#">Gmail</a>
      <a href="#">Images</a>
      <button class="icon-btn" aria-label="Google apps">⚙</button>
      <button class="icon-btn signin-btn">Sign in</button>
    </nav>
  </header>

  <main class="main-content">
    <img class="logo-img" src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" alt="Google logo">

    <form class="search-form" action="#">
      <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" autocomplete="off">
        <span class="mic-icon">🎤</span>
      </div>

      <div class="search-buttons">
        <button type="submit" class="search-btn">Google Search</button>
        <button type="button" class="search-btn">I'm Feeling Lucky</button>
      </div>
    </form>
  </main>

  <footer class="site-footer">
    <div class="footer-region">
      <span>India</span>
    </div>
    <div class="footer-links">
      <div class="footer-links-left">
        <a href="#">Advertising</a>
        <a href="#">Business</a>
        <a href="#">How Search works</a>
      </div>
      <div class="footer-links-right">
        <a href="#">Privacy</a>
        <a href="#">Terms</a>
        <a href="#">Settings</a>
      </div>
    </div>
  </footer>

</body>
</html>
